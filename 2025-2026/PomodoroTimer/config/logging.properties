# File logging settings
file.enabled=true
file.directory=logs
file.level=ALL
file.thread=false
file.timestamp=true

file.pattern=app.log
file.max.size=10485760
file.max.files=1
file.append=false

# Console logging settings
console.enabled=true
console.level=INFO
console.color=true
console.thread=false
console.timestamp=true

# App settings
app.name=Application
